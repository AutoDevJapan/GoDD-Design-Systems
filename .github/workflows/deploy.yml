name: Deploy

# Vercel 4 環境デプロイ:
#   preview : PR ごとに preview デプロイ + URL を PR へコメント
#   dev     : main への push で dev 環境へ (preview ビルドを dev エイリアスへ)
#   stg     : 手動 (workflow_dispatch, environment=stg) で staging へ昇格
#   prd     : 手動 (workflow_dispatch, environment=prd) + production 承認ゲート付き。
#             自動では絶対に走らない (push/PR では起動しない)。昇格は人手承認後のみ。
#
# 必要な GitHub Secrets: VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
# 既存の必須チェック (CI: schema / gitleaks) とは独立。ジョブ名は変更しない。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "昇格先環境"
        type: choice
        required: true
        default: stg
        options:
          - stg
          - prd

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_CLI_VERSION: "54.21.1"
  # dev / stg の安定エイリアス (プロジェクトの *.vercel.app サブドメイン)
  DEV_ALIAS: godd-design-systems-dev.vercel.app
  STG_ALIAS: godd-design-systems-stg.vercel.app

jobs:
  # --- preview: PR ごとの使い捨てプレビュー ---
  preview:
    name: preview (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: preview
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - name: Vercel CLI 導入
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"
      - name: 環境情報を取得 (preview)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: ビルド
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: デプロイ (prebuilt)
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "### preview デプロイ: $url" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: PR に preview URL をコメント
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- vercel-preview -->';
            const body = `${marker}\n🔎 **Preview デプロイ**: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # --- dev: main への push で dev 環境を更新 ---
  dev:
    name: dev (main push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://${{ env.DEV_ALIAS }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - name: Vercel CLI 導入
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"
      - name: 環境情報を取得 (preview)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: ビルド
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: デプロイして dev エイリアスへ割当
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "deployment: $url"
          vercel alias set "$url" "$DEV_ALIAS" --token="$VERCEL_TOKEN"
          echo "### dev デプロイ: https://$DEV_ALIAS ($url)" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # --- stg: 手動昇格 (dev -> stg 相当) ---
  stg:
    name: stg (手動昇格)
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'stg'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.STG_ALIAS }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - name: Vercel CLI 導入
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"
      - name: 環境情報を取得 (preview)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: ビルド
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: デプロイして stg エイリアスへ割当
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "deployment: $url"
          vercel alias set "$url" "$STG_ALIAS" --token="$VERCEL_TOKEN"
          echo "### stg デプロイ: https://$STG_ALIAS ($url)" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # --- prd: 手動昇格 + production 承認ゲート。今回は実行しない (定義のみ) ---
  prd:
    name: prd (承認ゲート)
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prd'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - name: Vercel CLI 導入
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"
      - name: 環境情報を取得 (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: 本番ビルド
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: 本番デプロイ
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "### prd デプロイ: $url" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
