name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema:
    name: schema 検証 (index.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
      - name: 依存インストール
        run: pnpm install --frozen-lockfile
      - name: index.json をスキーマ検証
        run: pnpm run validate:index
      - name: DESIGN.md をスキーマ + 構造検証
        run: pnpm run validate:design-md
      - name: jsic.json をスキーマ + 整合性 + index 相互検証
        run: pnpm run validate:jsic
      - name: taxonomy.json をスキーマ + index 相互検証 (color/mood 全カバー)
        run: pnpm run validate:taxonomy
      - name: 法務チェック (de-brand / オープン書体 / 出典表示 · SSOT §8)
        run: pnpm run legal:check
      - name: a11y 不変条件チェック (skip-link / landmark / focus / contrast · #23)
        run: pnpm run a11y:check

  secrets-scan:
    name: gitleaks (機密検出)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: gitleaks インストール
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: 機密スキャン (作業ツリー)
        run: gitleaks detect --no-git --redact -v
